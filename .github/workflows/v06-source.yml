name: v0.6 source gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  boundary-source:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - run: npm ci
      - run: go test ./...
        working-directory: native/go-provider
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build:native
      - run: npx vitest run tests/v06-boundary.test.ts
      - run: npm run build
