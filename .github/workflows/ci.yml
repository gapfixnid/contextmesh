name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - uses: actions/cache@v4
        with:
          path: .semantic-smoke-model
          key: semantic-smoke-${{ runner.os }}-761b726dd34fb839
      - run: npm run fetch:semantic-smoke-model -- --output .semantic-smoke-model
      - run: npm run smoke:semantic -- --model-path .semantic-smoke-model
      - run: npm run benchmark:semantic -- --model-path .semantic-smoke-model
        if: matrix.os == 'windows-latest'
      - run: npm run benchmark
        if: matrix.os == 'windows-latest'
