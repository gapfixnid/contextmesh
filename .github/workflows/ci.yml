name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  MODEL_REVISION: 761b726dd34fb83930e26aab4e9ac3899aa1fa78
  MODEL_MANIFEST_DIGEST: 264b845823877533ec6e3d1ce7f35100e79f75dda6a6b35d7bfe1280650f6ffa
  TRANSFORMERS_VERSION: 4.2.0
  ORT_VERSION: 1.24.3
  SOURCE_DATE_EPOCH: 1784246400

jobs:
  hosted-quality:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run verify:native-supply-chain
      - run: npm run evaluate:v04
      - run: npm run evaluate:multilang
      - run: npm run verify:package
      - run: npm run audit:production
        if: matrix.os == 'ubuntu-latest'

  actual-model-smoke:
    needs: hosted-quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - run: npm ci
      - name: Restore approved model cache (online staging)
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/contextmesh-approved-model
          key: semantic-model-${{ env.MODEL_REVISION }}-${{ env.MODEL_MANIFEST_DIGEST }}-${{ runner.os }}-${{ runner.arch }}-transformers-${{ env.TRANSFORMERS_VERSION }}-ort-${{ env.ORT_VERSION }}
      - name: Download and verify approved revision
        run: npm run fetch:semantic-smoke-model -- --output "${{ runner.temp }}/contextmesh-approved-model"
      - name: Runtime-offline session, inference, and dispose smoke
        run: npm run smoke:semantic -- --model-path "${{ runner.temp }}/contextmesh-approved-model"

  acceptance-parity-artifact:
    needs: actual-model-smoke
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/contextmesh-approved-model
          key: semantic-model-${{ env.MODEL_REVISION }}-${{ env.MODEL_MANIFEST_DIGEST }}-${{ runner.os }}-${{ runner.arch }}-transformers-${{ env.TRANSFORMERS_VERSION }}-ort-${{ env.ORT_VERSION }}
      - run: npm run fetch:semantic-smoke-model -- --output "${{ runner.temp }}/contextmesh-approved-model"
      - name: Acceptance-v2 quality gate
        run: >-
          npm run evaluate:quality --
          --fixture acceptance-v2
          --semantic-model "${{ runner.temp }}/contextmesh-approved-model"
          --output "artifacts/acceptance-${{ runner.os }}.json"
      - uses: actions/upload-artifact@v4
        with:
          name: acceptance-${{ runner.os }}-${{ github.sha }}
          path: artifacts/acceptance-${{ runner.os }}.json
          if-no-files-found: error

  ubuntu-windows-parity:
    needs: acceptance-parity-artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: acceptance-Windows-${{ github.sha }}
          path: parity/windows
      - uses: actions/download-artifact@v4
        with:
          name: acceptance-Linux-${{ github.sha }}
          path: parity/ubuntu
      - name: Exact ordered IDs and scoreMicro tolerance gate
        run: >-
          npm run compare:parity --
          --windows parity/windows/acceptance-Windows.json
          --ubuntu parity/ubuntu/acceptance-Linux.json
          --diagnostic-output parity/parity-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: parity-diagnostics-${{ github.sha }}
          path: parity

  hosted-windows-performance-informational:
    needs: hosted-quality
    runs-on: windows-latest
    continue-on-error: true
    env:
      CONTEXTMESH_RUNNER_CLASS: github-hosted-informational
      CONTEXTMESH_POWER_MODE: not_controlled
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/contextmesh-approved-model
          key: semantic-model-${{ env.MODEL_REVISION }}-${{ env.MODEL_MANIFEST_DIGEST }}-${{ runner.os }}-${{ runner.arch }}-transformers-${{ env.TRANSFORMERS_VERSION }}-ort-${{ env.ORT_VERSION }}
      - run: npm run fetch:semantic-smoke-model -- --output "${{ runner.temp }}/contextmesh-approved-model"
      - run: npm run benchmark
      - run: npm run benchmark:unavailable -- --model-path "${{ runner.temp }}/contextmesh-approved-model"

  fixed-windows-performance:
    needs: actual-model-smoke
    runs-on: [self-hosted, Windows, X64, contextmesh-perf-v1]
    concurrency:
      group: contextmesh-fixed-windows-performance
      cancel-in-progress: false
    env:
      CONTEXTMESH_RUNNER_CLASS: fixed-self-hosted-blocking
      CONTEXTMESH_POWER_MODE: ${{ vars.CONTEXTMESH_PERF_POWER_MODE }}
      CONTEXTMESH_PERF_CPU: ${{ vars.CONTEXTMESH_PERF_CPU }}
      CONTEXTMESH_PERF_LOGICAL_CPUS: ${{ vars.CONTEXTMESH_PERF_LOGICAL_CPUS }}
      CONTEXTMESH_PERF_MIN_RAM_BYTES: ${{ vars.CONTEXTMESH_PERF_MIN_RAM_BYTES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - run: npm ci
      - id: runner
        run: npx tsx scripts/assert-performance-runner.ts
      - uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/contextmesh-approved-model
          key: semantic-model-${{ env.MODEL_REVISION }}-${{ env.MODEL_MANIFEST_DIGEST }}-${{ runner.os }}-${{ runner.arch }}-transformers-${{ env.TRANSFORMERS_VERSION }}-ort-${{ env.ORT_VERSION }}
      - run: npm run fetch:semantic-smoke-model -- --output "${{ runner.temp }}/contextmesh-approved-model"
      - run: npm run benchmark
      - run: npm run benchmark:unavailable -- --model-path "${{ runner.temp }}/contextmesh-approved-model"
      - run: npm run benchmark:hydration
      - run: npm run benchmark:semantic -- --model-path "${{ runner.temp }}/contextmesh-approved-model"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fixed-windows-performance-${{ github.sha }}
          path: performance-runner.json

  phase4-release-gate:
    if: always()
    needs: [hosted-quality, actual-model-smoke, ubuntu-windows-parity, fixed-windows-performance, clean-source-zip-release-gate]
    runs-on: ubuntu-latest
    steps:
      - name: Require every blocking Phase 4 job
        if: >-
          needs.hosted-quality.result != 'success' ||
          needs.actual-model-smoke.result != 'success' ||
          needs.ubuntu-windows-parity.result != 'success' ||
          needs.fixed-windows-performance.result != 'success' ||
          needs.clean-source-zip-release-gate.result != 'success'
        run: exit 1
      - run: echo "Phase 4 release gates passed"

  clean-source-zip-release-gate:
    needs: [hosted-quality, actual-model-smoke, ubuntu-windows-parity, fixed-windows-performance]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/contextmesh-approved-model
          key: semantic-model-${{ env.MODEL_REVISION }}-${{ env.MODEL_MANIFEST_DIGEST }}-${{ runner.os }}-${{ runner.arch }}-transformers-${{ env.TRANSFORMERS_VERSION }}-ort-${{ env.ORT_VERSION }}
      - run: npm run fetch:semantic-smoke-model -- --output "${{ runner.temp }}/contextmesh-approved-model"
      - run: npm run verify:source-zip -- --model-path "${{ runner.temp }}/contextmesh-approved-model"
